# Note Watcher Configuration
# Copy to ~/.config/note-watcher/config.yml

# Path to your Obsidian vault
vault: ~/Obsidian/MyVault

# Seconds to wait before processing a file after a change
# (prevents duplicate processing during rapid saves)
debounce_seconds: 1.0

# File patterns to ignore (glob syntax)
ignore_patterns:
  - "*.excalidraw.md"
  - ".trash/**"
  - ".obsidian/**"
  - ".claude/**"
  - ".git/**"
  - ".github/**"

# Agent definitions
agents:
  # Built-in echo agent (returns instruction text unchanged)
  summarizer:
    type: echo

  # Built-in uppercase agent (returns instruction text in uppercase)
  uppercase:
    type: uppercase

  # Example command agent (runs a shell command)
  # word_count:
  #   type: command
  #   command: "wc -w"

  # Example Claude Code agent with inline system prompt
  # claude:
  #   type: command
  #   command: "claude --print"
  #   system_prompt: |
  #     You are working in an Obsidian vault at {vault_path}.
  #     The user has left an instruction in the note at {file_path}.
  #
  #     Read the note, then modify it as requested by the instruction.
  #     After making your changes, commit them to git with a descriptive
  #     message summarizing what you changed.
  #
  #     Respond with a brief summary of what you did.

  # Example agent with system prompt loaded from a file
  # (path is relative to the config file's directory)
  # claude-from-file:
  #   type: command
  #   command: "claude --print"
  #   system_prompt_file: prompts/claude.md
