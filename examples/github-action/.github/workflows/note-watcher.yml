name: Note Watcher
on:
  push:
    paths:
      - '**.md'
permissions:
  contents: write
jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/anthropic-cookbook/.github/actions/claude-code@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      - uses: britt/obsidian-note-watcher@main
        with:
          vault: '.'
